<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

  <div id="authContainer" class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-slate-800 p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-700">
      <h2 id="authTitle" class="text-3xl font-bold text-center mb-2 text-indigo-400">Welcome Back</h2>
      <p id="authSubtitle" class="text-slate-400 text-center mb-6 text-sm">Log in to manage your tasks</p>
      
      <div id="authAlert" class="hidden mb-4 p-3 text-sm text-red-200 bg-red-900/50 rounded-lg border border-red-700"></div>

      <form id="authForm" class="space-y-4">
        <div>
          <label class="block text-xs uppercase text-slate-400 font-semibold mb-1">Email</label>
          <input type="email" id="authEmail" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-100 focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="block text-xs uppercase text-slate-400 font-semibold mb-1">Password</label>
          <input type="password" id="authPassword" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-100 focus:outline-none focus:border-indigo-500">
        </div>
        <button type="submit" id="authSubmitBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 transition-colors py-2.5 rounded-lg font-semibold shadow-md">Log In</button>
      </form>

      <div class="mt-6 text-center text-sm text-slate-400">
        <span id="authTogglePrompt">Don't have an account?</span>
        <button id="authToggleBtn" class="text-indigo-400 hover:underline font-semibold ml-1">Sign Up</button>
      </div>
    </div>
  </div>

  <div id="appContainer" class="hidden min-h-screen flex flex-col">
    <header class="bg-slate-800/80 backdrop-blur border-b border-slate-700 sticky top-0 z-10 px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center font-bold text-white">T</div>
        <h1 class="text-xl font-bold tracking-wide">TaskManager</h1>
      </div>
      <div class="flex items-center gap-4">
        <span id="userEmailBadge" class="text-sm text-slate-400 bg-slate-900 px-3 py-1 rounded-full border border-slate-700"></span>
        <button id="logoutBtn" class="text-sm text-slate-300 hover:text-white bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-lg transition">Logout</button>
      </div>
    </header>

    <main class="flex-1 max-w-4xl w-full mx-auto p-4 md:p-6">
      <section class="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-md mb-8">
        <h2 class="text-lg font-semibold mb-3 text-indigo-300">Create New Task</h2>
        <form id="createTaskForm" class="space-y-3">
          <input type="text" id="taskTitleInput" placeholder="Task title..." required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-slate-100 focus:outline-none focus:border-indigo-500">
          <textarea id="taskDescInput" placeholder="Description (optional)..." rows="2" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-slate-100 focus:outline-none focus:border-indigo-500"></textarea>
          <div class="flex justify-end">
            <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white font-medium px-5 py-2 rounded-lg transition">Add Task</button>
          </div>
        </form>
      </section>

      <section>
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-bold">Your Tasks</h2>
          <div class="flex gap-2">
            <button id="filterAll" class="filter-btn text-xs font-semibold px-3 py-1.5 rounded-md bg-indigo-600 text-white">All</button>
            <button id="filterPending" class="filter-btn text-xs font-semibold px-3 py-1.5 rounded-md bg-slate-800 text-slate-400 hover:text-white">Pending</button>
            <button id="filterCompleted" class="filter-btn text-xs font-semibold px-3 py-1.5 rounded-md bg-slate-800 text-slate-400 hover:text-white">Completed</button>
          </div>
        </div>

        <div id="taskList" class="space-y-3"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
